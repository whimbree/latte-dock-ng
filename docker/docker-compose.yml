x-latte-verify: &latte-verify
  volumes:
    - ${LATTE_SRC:-..}:/src:ro
  tmpfs:
    - /build:exec
  working_dir: /build

services:
  arch:
    <<: *latte-verify
    build:
      context: .
      dockerfile: Dockerfile.arch
    command: bash /src/docker/verify-install.sh ARCH

  fedora:
    <<: *latte-verify
    build:
      context: .
      dockerfile: Dockerfile.fedora
    command: bash /src/docker/verify-install.sh FEDORA

  opensuse:
    <<: *latte-verify
    build:
      context: .
      dockerfile: Dockerfile.opensuse
    command: bash /src/docker/verify-install.sh OPENSUSE

  ubuntu:
    <<: *latte-verify
    build:
      context: .
      dockerfile: Dockerfile.ubuntu
    command: bash /src/docker/verify-install.sh UBUNTU

  mageia:
    <<: *latte-verify
    build:
      context: .
      dockerfile: Dockerfile.mageia
    command: bash /src/docker/verify-install.sh MAGEIA

  debian:
    <<: *latte-verify
    build:
      context: .
      dockerfile: Dockerfile.debian
    command: bash /src/docker/verify-install.sh DEBIAN

  gentoo:
    <<: *latte-verify
    build:
      context: .
      dockerfile: Dockerfile.gentoo
    command: bash /src/docker/verify-ebuild-gentoo.sh
