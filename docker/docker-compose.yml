services:
  arch:
    build:
      context: .
      dockerfile: Dockerfile.arch
    volumes:
      - /data/projects/latte-dock-ng:/src:ro
    tmpfs:
      - /build
    working_dir: /build
    command: >-
      bash -c "
        cmake /src -DCMAKE_INSTALL_PREFIX=/usr -DCMAKE_BUILD_TYPE=Release 2>&1 &&
        cmake --build . --parallel $(nproc) 2>&1 &&
        echo '=== ARCH: BUILD SUCCESS ==='
      "

  fedora:
